<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit Center</title>
    <style>
        body { background: #0d1117; color: #fff; font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        .tabs { display: flex; justify-content: center; gap: 40px; padding: 20px; background: #161b22; border-bottom: 1px solid #30363d; }
        .tab-btn { background: none; border: none; color: #8b949e; cursor: pointer; font-size: 18px; font-weight: bold; }
        .tab-btn.active { color: #ffbf00; border-bottom: 2px solid #ffbf00; }
        .content { display: none; }
        .content.active { display: block; }

        .task-card { background: #161b22; margin: 10px; padding: 15px; border-radius: 12px; border: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; }
        .buy-btn { background: #2575fc; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; box-shadow: 0 0 10px #2575fc; }

        .usdt-box { padding: 20px; text-align: center; }
        #qr-code-img { width: 180px; height: 180px; background: white; padding: 10px; margin: 20px auto; border-radius: 8px; }
        .wallet-box { background: #161b22; padding: 15px; border: 1px solid #30363d; border-radius: 8px; margin: 20px 0; }
        
        .nav { position: fixed; bottom: 0; width: 100%; background: #0d1117; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #30363d; }
    </style>
</head>
<body>

<div class="tabs">
    <button class="tab-btn active" onclick="show('inr')">INR</button>
    <button class="tab-btn" onclick="show('usdt')">USDT</button>
</div>

<div id="inr-section" class="content active">
    <div id="task-list"></div>
</div>

<div id="usdt-section" class="content">
    <div class="usdt-box">
        <img id="qr-code-img" src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=TDBuftovrajbsdMhXWHuoPATqAHDcthbx" alt="QR">
        <div class="wallet-box">
            <small>Wallet Address (TRC-20)</small>
            <div id="wallet-address" style="font-weight:bold; margin:10px 0; word-break: break-all;">TDBuftovrajbsdMhXWHuoPATqAHDcthbx</div>
            <button onclick="copyWallet()" style="background:#444; color:white; border:none; padding:5px 15px; border-radius:4px; cursor:pointer;">COPY</button>
        </div>
        <input type="number" id="amt" placeholder="Enter USDT Amount" style="width:90%; padding:15px; background:#161b22; color:white; border:1px solid #30363d; border-radius:8px;">
        <button onclick="exchangeUSDT()" style="width:90%; padding:15px; background:#2575fc; margin-top:20px; color:white; border:none; border-radius:8px; font-weight:bold;">EXCHANGE TO INR</button>
    </div>
</div>

<div class="nav">
    <a href="dashboard.html" style="color:white; text-decoration:none;">🏠 Home</a>
    <a href="deposit.html" style="color:white; text-decoration:none;">💰 Deposit</a>
    <a href="bank.html" style="color:white; text-decoration:none;">🏦 Bank</a>
    <a href="team.html" style="color:white; text-decoration:none;">👥 Team</a>
    <a href="profile.html" style="color:white; text-decoration:none;">👤 Profile</a>
</div>

<script>
    function show(id) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
        document.getElementById(id + '-section').classList.add('active');
        event.currentTarget.classList.add('active');
    }

    const list = document.getElementById('task-list');
    for (let i = 1; i <= 50; i++) { // मैंने 500 से घटाकर 50 कर दिया ताकि पेज भारी न हो
        let price = 1000 + (i * 200);
        list.innerHTML += `<div class="task-card">
            <div><strong>${price} INR</strong><br><small>Income: ${(price*0.03).toFixed(2)} (4%)</small></div>
            <a href="order_details.html?amt=${price}"><button class="buy-btn">Buy</button></a>
        </div>`;
    }

    // USDT एक्सचेंज फंक्शन
    async function exchangeUSDT() {
        const amt = document.getElementById('amt').value;
        const userId = localStorage.getItem('userId');
        
        if(!amt) { alert("Enter Amount!"); return; }

        const response = await fetch('http://localhost:3000/deposit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId, amount: amt })
        });
        
        const data = await response.json();
        alert(data.message);
    }

    function copyWallet() {
        let text = document.getElementById('wallet-address').innerText;
        navigator.clipboard.writeText(text);
        alert("Address Copied!");
    }
</script>

</body>
</html>
