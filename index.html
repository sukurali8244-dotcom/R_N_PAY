<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RN PAY Register</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #f0f4f8; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 20px; width: 350px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        .logo { width: 120px; margin-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: linear-gradient(to right, #6a11cb, #2575fc); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        a { color: #2575fc; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <img src="13901.png" alt="Logo" class="logo">
    
    <h2>Welcome to RN PAY!</h2>
    <p>Create Your Account</p>
    
    <input type="text" id="mobile" placeholder="Mobile Number">
    <input type="password" id="password" placeholder="Create Password">
    <input type="password" id="confirmPassword" placeholder="Confirm Password">
    <input type="text" id="referralCode" placeholder="Referral Code (Optional)">
    
    <button onclick="registerUser()">Register Now</button>

    <p>Already have an account? <a href="login.html">Login</a></p>
</div>

<script>
    async function registerUser() {
        const mobile = document.getElementById('mobile').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const referralCode = document.getElementById('referralCode').value;

        if(password !== confirmPassword) {
            alert("Passwords do not match!");
            return;
        }

        const response = await fetch('http://localhost:3000/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ mobile, referralCode })
        });

        const data = await response.json();
        if(data.success) {
            alert("Registration Successful! Your ID: " + data.userId);
            window.location.href = "login.html";
        } else {
            alert(data.message);
        }
    }
</script>

</body>
</html>
