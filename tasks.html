<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task Center</title>
    <style>
        body { background: #0d1117; color: white; font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        .header { padding: 20px; font-size: 20px; font-weight: bold; text-align: center; color: #ffbf00; }
        .task-card { background: #161b22; margin: 10px; padding: 15px; border-radius: 12px; border: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; }
        .buy-btn { background: #ff4500; color: white; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; box-shadow: 0 0 15px #ff4500; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #0d1117; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #30363d; }
    </style>
</head>
<body>
    <div class="header">Task Center</div>
    <div id="task-list"></div>
    <script>
        const list = document.getElementById('task-list');
        for (let i = 1; i <= 500; i++) {
            let price = 1000 + (i * 200);
            let card = document.createElement('div');
            card.className = 'task-card';
            card.innerHTML = `<div><strong>${price} INR</strong><br>Income: ${(price*0.03).toFixed(0)} (3%)</div> <a href="order_details.html?amount=${price}"><button class="buy-btn">Buy</button></a>`;
            list.appendChild(card);
        }
    </script>
    <div class="nav">
        <a href="dashboard.html" style="color:white; text-decoration:none;">🏠 Home</a>
        <a href="deposit.html" style="color:white; text-decoration:none;">💰 Deposit</a>
    </div>
</body>
</html>
